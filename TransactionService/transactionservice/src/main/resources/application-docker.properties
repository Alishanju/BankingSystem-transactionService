#final use: docker run -d --name transaction-service -p 8084:8081 -e SPRING_PROFILES_ACTIVE=docker -e DB_HOST=host.docker.internal -e CUSTOMER_SERVICE_URL=http://host.docker.internal:8082 -e RABBITMQ_HOST=host.docker.internal -e ZIPKIN_HOST=host.docker.internal transaction-service:latest

# Local Docker Run
# -e CUSTOMER_SERVICE_URL=http://host.docker.internal:8081
# Docker Customer Service
# -e CUSTOMER_SERVICE_URL=http://host.docker.internal:8082
# APPLICATION
#################################################

server.port=8081

#################################################
# POSTGRES
#################################################

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/transactiondb

spring.datasource.username=postgres

spring.datasource.password=Sql@1234

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#################################################
# CUSTOMER SERVICE (OPENFEIGN)
#################################################

customer.service.url=${CUSTOMER_SERVICE_URL}

#################################################
# RABBITMQ
#################################################

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}

spring.rabbitmq.port=5672

spring.rabbitmq.username=guest

spring.rabbitmq.password=guest

#################################################
# ZIPKIN
#################################################

management.tracing.sampling.probability=1.0

management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:zipkin}:9411/api/v2/spans